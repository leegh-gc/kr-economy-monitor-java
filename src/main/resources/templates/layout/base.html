<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국 경제 & 서울 부동산 현황</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 헤더 -->
<header class="bg-dark text-white py-3 mb-0">
    <div class="container-xl">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-bar-chart-line-fill fs-4 text-info"></i>
            <h1 class="h5 mb-0 fw-bold">한국 경제 &amp; 서울 부동산 현황</h1>
            <span class="ms-auto text-muted small" id="last-updated"></span>
        </div>
    </div>
</header>

<!-- 탭 네비게이션 -->
<nav class="bg-white border-bottom shadow-sm sticky-top">
    <div class="container-xl">
        <ul class="nav nav-tabs border-0">
            <li class="nav-item">
                <a th:href="@{/?tab=economy}"
                   th:class="${activeTab == 'economy'} ? 'nav-link active fw-semibold' : 'nav-link text-muted'">
                    <i class="bi bi-graph-up-arrow me-1"></i>경제 현황
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/?tab=realestate}"
                   th:class="${activeTab == 'realestate'} ? 'nav-link active fw-semibold' : 'nav-link text-muted'">
                    <i class="bi bi-building me-1"></i>부동산 현황
                </a>
            </li>
        </ul>
    </div>
</nav>

<!-- 메인 콘텐츠 -->
<main class="container-xl py-4">
    <div layout:fragment="content">
        <!-- 페이지별 콘텐츠 -->
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmRCQBExNmBoRc4G7GLxoFJHB7"
        crossorigin="anonymous"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<th:block layout:fragment="scripts">
    <!-- 페이지별 스크립트 -->
</th:block>

<script>
    // 현재 시각 표시
    document.getElementById('last-updated').textContent =
        '업데이트: ' + new Date().toLocaleString('ko-KR', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit'
        });
</script>
</body>
</html>
