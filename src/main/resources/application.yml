spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:leeghhome.iptime.org}:${DB_PORT:5432}/${DB_NAME:aptprice_data}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  thymeleaf:
    cache: false
    encoding: UTF-8

app:
  ecos:
    api-key: ${ECOS_API_KEY}
    base-url: http://ecos.bok.or.kr/api/StatisticSearch
    timeout-seconds: 10
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model-text: gemini-2.0-flash
    model-image: gemini-2.0-flash-preview-image-generation
  cache:
    dir: ${user.dir}/cache

server:
  port: 8080

logging:
  level:
    com.kreconomy: INFO
    org.hibernate.SQL: WARN
